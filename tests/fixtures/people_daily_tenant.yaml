version: "0.1.1"
semantic_model:
  - name: people_daily
    description: >-
      Denormalized people grain — single table api.people_daily.
    datasets:
      - name: people_daily
        source: api.people_daily
        custom_extensions:
          - vendor_name: MNML
            data: >-
              {"version":1,"format":"parquet","location":"people_daily/data.parquet"}
        fields:
          - name: dt
            expression:
              dialects:
                - dialect: MNML
                  col: dt

          - name: year
            expression:
              dialects:
                - dialect: MNML
                  col: year

          - name: day
            expression:
              dialects:
                - dialect: MNML
                  col: day

          - name: month_days
            expression:
              dialects:
                - dialect: MNML
                  col: month_days

          - name: year_mm
            expression:
              dialects:
                - dialect: MNML
                  col: year_mm

          - name: month_desc
            expression:
              dialects:
                - dialect: MNML
                  col: month_desc

          - name: year_q
            expression:
              dialects:
                - dialect: MNML
                  col: year_q

          - name: team_id
            expression:
              dialects:
                - dialect: MNML
                  col: team_id

          - name: team_name
            expression:
              dialects:
                - dialect: MNML
                  col: team_name

          - name: team_org_unit
            expression:
              dialects:
                - dialect: MNML
                  col: team_org_unit

          - name: team_domain
            expression:
              dialects:
                - dialect: MNML
                  col: team_domain

          - name: employment_id
            expression:
              dialects:
                - dialect: MNML
                  col: employment_id

          - name: employment_type_name
            expression:
              dialects:
                - dialect: MNML
                  col: employment_type_name

          - name: employment_start_date
            expression:
              dialects:
                - dialect: MNML
                  col: employment_start_date

          - name: employment_end_date
            expression:
              dialects:
                - dialect: MNML
                  col: employment_end_date

          - name: employment_end_reason
            expression:
              dialects:
                - dialect: MNML
                  col: employment_end_reason

          - name: employment_movement
            expression:
              dialects:
                - dialect: MNML
                  col: employment_movement

          - name: person_id
            expression:
              dialects:
                - dialect: MNML
                  col: person_id

          - name: person_name
            expression:
              dialects:
                - dialect: MNML
                  col: person_name

          - name: person_location
            expression:
              dialects:
                - dialect: MNML
                  col: person_location

          - name: person_gender
            expression:
              dialects:
                - dialect: MNML
                  col: person_gender

          - name: is_starter
            expression:
              dialects:
                - dialect: MNML
                  col: is_starter

          - name: is_leaver
            expression:
              dialects:
                - dialect: MNML
                  col: is_leaver

          - name: has_left
            expression:
              dialects:
                - dialect: MNML
                  col: has_left

          - name: starter_flag
            description: 1 on rows where the person started on this date
            expression:
              dialects:
                - dialect: MNML
                  case:
                    - when:
                        eq:
                          - col: is_starter
                          - lit: 1
                      then:
                        lit: 1
                  else:
                    lit: 0

          - name: leaver_flag
            description: 1 on rows where the person left on this date
            expression:
              dialects:
                - dialect: MNML
                  case:
                    - when:
                        eq:
                          - col: is_leaver
                          - lit: 1
                      then:
                        lit: 1
                  else:
                    lit: 0

    relationships: []
    metrics:
      - name: starters
        expression:
          dialects:
            - dialect: MNML
              aggregation: sum
              field: people_daily.starter_flag

      - name: turnover
        expression:
          dialects:
            - dialect: MNML
              aggregation: sum
              field: people_daily.leaver_flag

      - name: num_days
        expression:
          dialects:
            - dialect: MNML
              aggregation: count
              distinct: true
              field: people_daily.dt

      - name: count
        expression:
          dialects:
            - dialect: MNML
              aggregation: count

      - name: num_employees
        expression:
          dialects:
            - dialect: MNML
              aggregation: count
              distinct: true
              field: people_daily.person_id

      - name: tenure
        expression:
          dialects:
            - dialect: MNML
              aggregation: max
              expr:
                sub:
                  - current_date: true
                  - col: people_daily.employment_start_date
