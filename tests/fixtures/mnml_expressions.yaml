version: "0.1.1"

semantic_model:
  - name: mnml_model
    datasets:
      - name: fact
        source: warehouse.public.fact_table
        fields:
          - name: id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: id
          - name: is_starter
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: is_starter
          - name: starter_flag
            expression:
              dialects:
                - dialect: MNML
                  case:
                    - when:
                        eq:
                          - col: is_starter
                          - lit: 1
                      then:
                        lit: 1
                  else:
                    lit: 0

    metrics:
      - name: row_count
        expression:
          dialects:
            - dialect: MNML
              aggregation: count

      - name: starters
        expression:
          dialects:
            - dialect: MNML
              aggregation: sum
              field: fact.starter_flag
